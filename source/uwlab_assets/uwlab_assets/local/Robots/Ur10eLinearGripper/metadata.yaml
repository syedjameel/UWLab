# UR10e + linear gripper metadata. Gripper grasp fields = the linear gripper's geometry
# (identical to Ur5eLinearGripper/metadata.yaml -- same gripper, same wrist mount);
# calibrated_joints / link_inertials are the UR10e ARM values (copied from
# Robots/UR10e/metadata.yaml, NOMINAL from the URDF) -- consumed by kinematics.py (OSC).
# gripper_offset is the verified grip-zone TCP (0.07), read by the reset/reward/observation
# code to place the object at the TCP.
#
# sysid: REAL UR10e values, identified 2026-07-05 (CMA-ES closed-loop chirp replay, PACE
# style; robot serial 20185000717 with the linear gripper mounted, real 0.575 kg payload in
# sim). Fit (re-validated 2026-07-06 at the correct delay, see below): per-joint RMSE
# pan 0.30 / lift 1.87 / elbow 1.29 / w1 0.89 / w2 0.34 / w3 0.26 deg over an 8 s
# 0.1-3 Hz chirp (< 2 deg everywhere; run logs/sysid/20260705_120940).
# Motor delay: the CMA-ES "delay=4" was an artifact (the fit/plot scripts reset the env
# AFTER applying the delay, re-randomizing it -- fixed 2026-07-06, commit 510248a). The
# 0..8-step sweep over this frozen fit is monotonically best at delay 0 @ 500 Hz: the
# residual delay PAIRED WITH these params is 0 steps (< 2 ms). Finetune DR keeps the
# paper's {0,1,2} @ 120 Hz; Finetune-Play pins 0.
# Only the Finetune/Finetune-Play tasks read this block (randomize_arm_from_sysid);
# Stage-1 train/eval never do.
gripper_offset:
  pos: [0.0, 0.0, 0.07]
  quat: [1.0, 0.0, 0.0, 0.0]
finger_offset: 0.07
finger_clearance: 0.05
maximum_aperture: 0.13
gripper_approach_direction: [0, 0, 1]
grasp_align_axis: [1, 0, 0]
orientation_sample_axis: [0, 0, 1]
finger_open_joint_angle: 0.0
sysid:
