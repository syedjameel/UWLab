# UR10e + linear gripper metadata. Gripper grasp fields = the linear gripper's geometry
# (identical to Ur5eLinearGripper/metadata.yaml -- same gripper, same wrist mount);
# calibrated_joints / link_inertials are the UR10e ARM values (copied from
# Robots/UR10e/metadata.yaml, NOMINAL from the URDF) -- consumed by kinematics.py (OSC).
# gripper_offset is the verified grip-zone TCP (0.07), read by the reset/reward/observation
# code to place the object at the TCP.
#
# sysid: PLACEHOLDER = the UR5e's cloud-calibrated values. Only the Finetune/Finetune-Play
# tasks read it (randomize_arm_from_sysid); Stage-1 train/eval never do. Replace with a real
# UR10e calibration (scripts_v2/tools/sim2real) before trusting finetune for sim2real (P8).
